services:

  ingestion:
    build: ./services/ingestion
    container_name: ingestion
    ports:
      - "8001:8001"
    networks:
      - pipeline

  preprocessing:
    build: ./services/preprocessing
    container_name: preprocessing
    ports:
      - "8002:8002"
    networks:
      - pipeline

  feature_selection:
    build: ./services/feature_selection
    container_name: feature_selection
    ports:
      - "8003:8003"
    networks:
      - pipeline

  training:
    build: ./services/training
    container_name: training
    ports:
      - "8004:8004"
    networks:
      - pipeline

  evaluation:
    build: ./services/evaluation
    container_name: evaluation
    ports:
      - "8005:8005"
    networks:
      - pipeline

networks:
  pipeline:
    driver: bridge