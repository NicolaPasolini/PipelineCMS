      retries: 3
    networks:
      - pipeline

  evaluation:
    build: ./services/evaluation
    container_name: evaluation
    restart: unless-stopped
    ports:
      - "8005:8005"
    command: uvicorn main:app --host 0.0.0.0 --port 8005 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
